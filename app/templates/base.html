<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sales{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">

  <!-- HEADER -->
  <header class="sticky top-0 z-10 bg-slate-900 text-slate-100 border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Logo / Title -->
      <a href="{% url 'app:customer_list' %}" class="font-bold text-lg text-blue-400">
        Sales Panel
      </a>

      <!-- Navigation -->
      <nav class="flex items-center gap-3">
        <a href="{% url 'app:staff_materials' %}"
          class="px-3 py-2 rounded-lg hover:bg-white/20 transition">
          Materials
        </a>
        <!--hover:bg-red-600 put after the lg-->
        <a href="{% url 'app:logout' %}" class="px-3 py-2 rounded-lg hover:bg-white/20 transition">
          Logout
        </a>

      </nav>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
